<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>论坛</title>

    <script  th:src="@{/js/jquery/2.0.0/jquery.min.js}" src="/js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{/css/bootstrap/3.3.6/bootstrap.min.css}" href="/css/bootstrap/3.3.6/bootstrap.min.css" rel="stylesheet"/>
    <script th:src="@{/js/bootstrap/3.3.6/bootstrap.min.js}" src="/js/bootstrap/3.3.6/bootstrap.min.js"></script>
    <script type="text/javascript" th:src="@{/js/private.js}"></script>
    <link th:href="@{/css/tx.css}" rel="stylesheet"/>

</head>
<body>
<canvas id="canvas"></canvas>
<script type="text/javascript" th:src="@{/js/triangle-bg.js}"></script>


<div class="container">
    <div th:replace="head::header"></div>

    <!-- 板块筛选 & 搜索 -->
    <div class="row" style="margin: 20px 0;">
        <div class="col-xs-12">
            <form class="form-inline" method="get" action="/">
                <div class="form-group" style="margin-right: 15px;">
                    <label for="categoryFilter">板块筛选：</label>
                    <select class="form-control" id="categoryFilter" name="category" onchange="this.form.submit()">
                        <option value="">全部板块</option>
                        <option value="娱乐" th:selected="${currentCategory == '娱乐'}">娱乐</option>
                        <option value="技术" th:selected="${currentCategory == '技术'}">技术</option>
                        <option value="美食" th:selected="${currentCategory == '美食'}">美食</option>
                        <option value="旅游" th:selected="${currentCategory == '旅游'}">旅游</option>
                        <option value="问题" th:selected="${currentCategory == '问题'}">问题</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" id="keywordInput" name="keyword" placeholder="搜索帖子标题或发帖用户" th:value="${keyword}" style="width: 200px;"/>
                    <button type="submit" class="btn btn-primary">搜索</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row" th:each="post:${page.modelList}">
        <div class="col-xs-12">
            <div class="panel panel-info">
                <div class="panel-heading" style="font-size: 18px;font-weight: bolder">
                    <span th:text="${post.ptitle}">帖子标题</span>
                    <span th:if="${post.isSticky != null and post.isSticky == 1}" class="label label-danger pull-right" style="margin-left: 5px;">
                        <span class="glyphicon glyphicon-pushpin"></span> 置顶
                    </span>
                    <span th:switch="${post.category}" style="margin-left: 10px;">
                        <span th:case="'娱乐'" class="label label-success pull-right" th:text="${post.category}">娱乐</span>
                        <span th:case="'技术'" class="label label-primary pull-right" th:text="${post.category}">技术</span>
                        <span th:case="'美食'" class="label label-warning pull-right" th:text="${post.category}">美食</span>
                        <span th:case="'旅游'" class="label label-info pull-right" th:text="${post.category}">旅游</span>
                        <span th:case="'问题'" class="label label-danger pull-right" th:text="${post.category}">问题</span>
                        <span th:case="*" class="label label-default pull-right" th:text="${post.category}">其他</span>
                    </span>
                </div>
                <div class="panel-body" style="height: 95px;display: -webkit-box;-webkit-box-orient: vertical;-webkit-line-clamp: 4;overflow: hidden;">
                    <div class="row">
                        <div class="col-xs-3" th:if="${post.path != null and !post.path.isEmpty()}">
                            <img th:src="${post.path}" alt="封面图片" style="width: 100%; height: 80px; object-fit: cover; border-radius: 4px;"
                                 onerror="this.src='https://via.placeholder.com/150x80/e0e0e0/666?text=No+Image';">
                        </div>
                        <div th:classappend="${post.path != null and !post.path.isEmpty()} ? 'col-xs-9' : 'col-xs-12'">
                            <div th:utext="${post.pbody}">
                                帖子内容<br/>
                                帖子内容<br/>
                                帖子内容<br/>
                                帖子内容<br/>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="panel-footer" style="height: 40px;">
                    <div class="col-xs-2">
                        <div style="display: flex; align-items: center;">
                            <div style="position: relative; display: inline-block; margin-right: 5px;">
                                <img th:src="${post.user.path} ?: 'https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'"
                                     style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; cursor: pointer;"
                                     th:onclick="'showUserProfile('+${post.user.uid}+')'"
                                     th:title="'点击查看'+${post.user.uname}+'的资料'"
                                     onerror="this.src='https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'">
                                <span th:if="${post.user.verified == 1}"
                                      style="position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; background: #4A90D9; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 9px; color: white; font-weight: bold; line-height: 1;">V</span>
                            </div>
                            <span class="text-info" style="cursor: pointer;"
                                  th:onclick="'showUserProfile('+${post.user.uid}+')'"
                                  th:title="'点击查看'+${post.user.uname}+'的资料'"
                                  th:text="|发帖用户:${post.user.uname}|">发帖用户:xxx</span>
                        </div>
                    </div>
                    <div class="col-xs-6">
                        <span class="text-primary"
                              th:text="${post.lastreplytime==null}?|发帖时间:${#dates.format(post.psendtime,'yyyy-MM-dd HH:mm:ss')}|:|最后回复时间:${#dates.format(post.lastreplytime,'yyyy-MM-dd HH:mm:ss')}|">最后回复时间:2019-2-5-08:00:00</span>
                    </div>
                    <div class="col-xs-2">
                        <span class="badge" th:text="|回复数:${post.replyCount}|">回复数:42</span>
                    </div>
                    <div class="col-xs-1">
                        <span class="badge" th:text="|收藏:${post.favoriteCount}|">收藏:0</span>
                    </div>
                    <div class="col-xs-1">
                        <a th:href="|/post/${post.pid}.html|">
                            <button type="button" class="btn btn-primary btn-xs">查看</button>
                        </a>
                    </div>
                    <div class="col-xs-1" th:if="${session.user!=null}">
                        <button type="button" class="btn btn-warning btn-xs favorite-btn"
                                th:if="${post.isFavorited==null or !post.isFavorited}"
                                th:onclick="${post.pid == 12 or post.pid == 3} ? 'alert(\'该帖子已被锁定，无法修改\')' : 'addFavorite('+${post.pid}+')'">
                            <span class="glyphicon glyphicon-star-empty"></span> 收藏
                        </button>
                        <button type="button" class="btn btn-danger btn-xs favorite-btn favorited"
                                th:if="${post.isFavorited!=null and post.isFavorited}"
                                th:onclick="${post.pid == 12 or post.pid == 3} ? 'alert(\'该帖子已被锁定，无法修改\')' : 'removeFavorite('+${post.pid}+')'">
                            <span class="glyphicon glyphicon-star"></span> 已收藏
                        </button>
                    </div>
                    <div class="col-xs-1" th:if="${session.user!=null}?(${session.user.uid == post.user.uid}?true:${session.user.level==0}):false">
                        <a th:href="${post.pid == 12 or post.pid == 3} ? 'javascript:void(0)' : |/delete/${post.pid}|"
                           th:onclick="${post.pid == 12 or post.pid == 3} ? 'alert(\'该帖子已被锁定，无法修改\');return false;' : 'return confirm(\'确定要删除这个帖子吗？删除后无法恢复！\');'">
                            <button type="button" class="btn btn-primary btn-xs">删除</button>
                        </a>
                    </div>
                    <div class="col-xs-1" th:if="${session.user!=null and session.user.level==0}">
                        <a th:if="${post.isSticky != null and post.isSticky == 1}"
                           th:href="${post.pid == 12 or post.pid == 3} ? 'javascript:alert(\'该帖子已被锁定，无法修改\')' : |javascript:toggleSticky(${post.pid}, 'unsticky')|">
                            <button type="button" class="btn btn-warning btn-xs">
                                <span class="glyphicon glyphicon-arrow-down"></span> 取消置顶
                            </button>
                        </a>
                        <a th:if="${post.isSticky == null or post.isSticky == 0}"
                           th:href="${post.pid == 12 or post.pid == 3} ? 'javascript:alert(\'该帖子已被锁定，无法修改\')' : |javascript:toggleSticky(${post.pid}, 'sticky')|">
                            <button type="button" class="btn btn-success btn-xs">
                                <span class="glyphicon glyphicon-arrow-up"></span> 置顶
                            </button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="row">
        <div class="col-xs-12">
            <nav>
                <ul class="pager">
                    <li class="previous" th:if="${page.currentPage!=1}">
                        <a th:href="${keyword != null && !keyword.isEmpty()} ?
                            (${currentCategory != null && !currentCategory.isEmpty()} ?
                                |?page=${page.currentPage-1}&category=${currentCategory}&keyword=${keyword}| :
                                |?page=${page.currentPage-1}&keyword=${keyword}|) :
                            (${currentCategory != null && !currentCategory.isEmpty()} ?
                                |?page=${page.currentPage-1}&category=${currentCategory}| :
                                |?page=${page.currentPage-1}|)">
                            <span aria-hidden="true">&larr;</span> 上一页
                        </a>
                    </li>
                    <li class="text-primary" th:text="|当前第${page.currentPage}页，共${page.pageTotal}页|">当前第1页，共4页</li>
                    <li class="next" th:if="${page.currentPage!=page.pageTotal}">
                        <a th:href="${keyword != null && !keyword.isEmpty()} ?
                            (${currentCategory != null && !currentCategory.isEmpty()} ?
                                |?page=${page.currentPage+1}&category=${currentCategory}&keyword=${keyword}| :
                                |?page=${page.currentPage+1}&keyword=${keyword}|) :
                            (${currentCategory != null && !currentCategory.isEmpty()} ?
                                |?page=${page.currentPage+1}&category=${currentCategory}| :
                                |?page=${page.currentPage+1}|)">
                            下一页<span aria-hidden="true">&rarr;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="userProfileModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-body" style="text-align: center; padding: 25px;">
                <div id="userProfileAvatarWrapper" style="position: relative; display: inline-block;">
                    <img id="userProfileAvatar" src="" alt="头像"
                         style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #eee;"
                         onerror="this.src='https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'">
                    <span id="userProfileBadge" style="display: none; position: absolute; bottom: 2px; right: 2px; width: 22px; height: 22px; background: #4A90D9; border-radius: 50%; border: 2px solid white; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: bold; line-height: 1;">V</span>
                </div>
                <h4 id="userProfileName" style="margin-bottom: 15px; color: #333;"></h4>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>联系电话：</strong><span id="userProfilePhone"></span>
                </p>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>职业：</strong><span id="userProfileCareer"></span>
                </p>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>工作地址：</strong><span id="userProfileAddress"></span>
                </p>
                <div id="followBtnContainer" style="margin-top: 15px; display: none;">
                    <button type="button" class="btn btn-primary" id="followBtn" style="display: none;" onclick="handleFollow()">关注</button>
                    <button type="button" class="btn btn-danger" id="unfollowBtn" style="display: none;" onclick="handleUnfollow()">取消关注</button>
                </div>
                <button type="button" class="btn btn-default" data-dismiss="modal" style="margin-top: 15px;">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
var currentProfileUid = null;
var currentFollowed = false;
var currentLoginUid = '/*[[${session.user != null ? session.user.uid : ""}]]*/';

function showUserProfile(uid) {
    currentProfileUid = uid;
    $.get('/user/profile/' + uid, function(data) {
        if (data.error) {
            alert(data.error);
            return;
        }
        $('#userProfileAvatar').attr('src', data.path || 'https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg');
        $('#userProfileName').text(data.uname || '未知用户');
        $('#userProfilePhone').text(data.phone || '未设置');
        $('#userProfileCareer').text(data.career || '未设置');
        $('#userProfileAddress').text(data.address || '未设置');
        if (data.verified == 1) {
            $('#userProfileBadge').css('display', 'flex');
        } else {
            $('#userProfileBadge').css('display', 'none');
        }
        checkFollowStatus(uid);
        $('#userProfileModal').modal('show');
    }).fail(function() {
        alert('获取用户信息失败');
    });
}

function checkFollowStatus(uid) {
    if (!currentLoginUid || currentLoginUid == uid) {
        $('#followBtnContainer').hide();
        return;
    }
    $('#followBtnContainer').show();
    $.get('/follow/check/' + uid, function(data) {
        if (data.loggedIn) {
            currentFollowed = data.isFollowed;
            $('#followBtn').toggle(!data.isFollowed);
            $('#unfollowBtn').toggle(data.isFollowed);
        } else {
            $('#followBtnContainer').hide();
        }
    });
}

function handleFollow() {
    $.get('/follow/add/' + currentProfileUid, function(data) {
        alert(data);
        if (data == '关注成功') {
            currentFollowed = true;
            $('#followBtn').hide();
            $('#unfollowBtn').show();
        }
    });
}

function handleUnfollow() {
    $.get('/follow/remove/' + currentProfileUid, function(data) {
        alert(data);
        if (data == '取消关注成功') {
            currentFollowed = false;
            $('#followBtn').show();
            $('#unfollowBtn').hide();
        }
    });
}
</script>
</body>
</html>
