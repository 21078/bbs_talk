<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>error</title>
    <script th:src="@{js/jquery/2.0.0/jquery.min.js}" src="js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{../css/bootstrap/3.3.6/bootstrap.min.css}" href="css/bootstrap/3.3.6/bootstrap.min.css"
          rel="stylesheet"/>
    <script th:src="@{js/bootstrap/3.3.6/bootstrap.min.js}" src="js/bootstrap/3.3.6/bootstrap.min.js"></script>
    <style>
        .countdown {
            font-weight: bold;
            color: #d9534f;
        }
    </style>
</head>
<body>
<div class="container" style="margin-top: 100px;">
    <div class="panel panel-danger">
        <div class="panel-heading">
            <h3 class="panel-title">操作结果</h3>
        </div>
        <div class="panel-body text-center">
            <div style="font-size: 24px; margin-bottom: 20px;">
                <span th:text="${message}">操作消息</span>
            </div>

            <div class="alert alert-info" style="margin: 20px 0;">
                <span class="countdown" id="countdown">5</span> 秒后自动跳转到首页
            </div>

            <div style="margin-top: 20px;">
                <a href="/" class="btn btn-primary">立即跳转</a>
            </div>

            <div style="margin-top: 20px; font-size: 12px;">
                <a href="https://www.baidu.com/s?wd=网页为什么会出现error">网页为什么会出现error</a>
            </div>
        </div>
    </div>
</div>

<script>
    $(function() {
        var countdown = 5;
        var countdownElement = $('#countdown');

        var timer = setInterval(function() {
            countdown--;
            countdownElement.text(countdown);

            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = '/';
            }
        }, 1000);

        // 点击立即跳转按钮时清除定时器
        $('.btn-primary').click(function() {
            clearInterval(timer);
        });
    });
</script>
</body>
</html>
