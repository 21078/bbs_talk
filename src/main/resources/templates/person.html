<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人管理</title>
    <script th:src="@{/js/jquery/2.0.0/jquery.min.js}" src="/js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{/css/bootstrap/3.3.6/bootstrap.min.css}" href="/css/bootstrap/3.3.6/bootstrap.min.css"
          rel="stylesheet"/>
    <script th:src="@{/js/bootstrap/3.3.6/bootstrap.min.js}" src="/js/bootstrap/3.3.6/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <style>
    .crop-circle .cropper-crop-box {
        overflow: hidden;
    }
    .crop-circle .cropper-crop-box::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 50%;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        pointer-events: none;
        z-index: 10;
    }
    </style>
    <script type="text/javascript" th:src="@{/js/private.js}"></script>
<script type="text/javascript">
var cropper = null;
var croppedBlob = null;

$(document).ready(function() {
    $('#avatarImage').change(function(e) {
        var file = e.target.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过5MB');
                $(this).val('');
                return;
            }
            var fileType = file.type.toLowerCase();
            if (fileType !== 'image/jpeg' && fileType !== 'image/png' && fileType !== 'image/jpg') {
                alert('只支持JPG和PNG格式的图片');
                $(this).val('');
                return;
            }
            var reader = new FileReader();
            reader.onload = function(e) {
                $('#cropImage').attr('src', e.target.result);
                $('#cropModal').modal('show');
            };
            reader.readAsDataURL(file);
        }
    });

    $('#cropModal').on('shown.bs.modal', function() {
        if (cropper) cropper.destroy();
                        cropper = new Cropper(document.getElementById('cropImage'), {
                            aspectRatio: 1,
                            viewMode: 1,
                            dragMode: 'move',
                            autoCropArea: 0.5,
            cropBoxMovable: true,
            cropBoxResizable: true,
            background: false,
        });
    });

    $('#cropModal').on('hidden.bs.modal', function() {
        if (cropper) { cropper.destroy(); cropper = null; }
    });

    $('#confirmCrop').click(function() {
        if (cropper) {
            var canvas = cropper.getCroppedCanvas({ width: 200, height: 200 });
            canvas.toBlob(function(blob) {
                croppedBlob = blob;
                $('#avatarPreview').attr('src', canvas.toDataURL());
                $('#cropModal').modal('hide');
            }, 'image/jpeg', 0.9);
        }
    });

    $('#profileForm').submit(function(e) {
        var phone = $('input[name="phone"]').val();
        if (phone && phone.length > 0 && !/^\d+$/.test(phone)) {
            alert('联系电话必须为数字');
            return false;
        }
        if (croppedBlob) {
            e.preventDefault();
            var formData = new FormData(this);
            formData.delete('avatarImage');
            formData.append('avatarImage', croppedBlob, 'avatar.jpg');
            $.ajax({
                url: '/updateProfile.do',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function() { location.href = '/person.do'; },
                error: function() { alert('更新失败'); }
            });
        }
    });
});
</script>
</head>
<body>

<div class="container">

    <div th:replace="head::header"></div>

    <div class="row">

        <div class="panel panel-default">
            <div class="panel-heading" role="tab" id="headingOne">
                <h4 class="panel-title">
                    <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseOne"
                       aria-expanded="false"
                       aria-controls="collapseOne">
                        密码管理
                    </a>
                </h4>
            </div>
             <div id="collapseOne" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="headingOne">
                <div class="panel-body">
                    <div class="row">
                        <div class="col-xs-2">
                            <h4 class="text-success">更改密码</h4>
                        </div>
                    </div>
                    <div style="width:500px;margin: 0 auto;">
                        <form action="/updatePassword.do" method="post" id="updateForm">
                            <table style="text-align: right;font-size: 17px"
                                   class="table table-striped table-bordered table-hover table-condensed">
                                <tr>
                                    <td>当前密码</td>
                                    <td><input type="password" class="form-control" name="oldPwd" ></td>
                                </tr>
                                <tr>
                                    <td>新密码</td>
                                    <td><input type="password" class="form-control" name="newPwd" id="personNewPwd"></td>
                                </tr>
                                <tr>
                                    <td>确认密码</td>
                                    <td><input type="password" class="form-control" id="personConfirmPwd"></td>
                                </tr>
                            </table>
                            <div align="center">
                                <input type="submit" class="btn btn-danger" value="更改" id="updatePwd"/>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>

        <div class="row" style="margin-top: 30px;">
            <div class="panel panel-default">
                <div class="panel-heading" role="tab" id="headingTwo">
                    <h4 class="panel-title">
                        <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseTwo"
                           aria-expanded="true"
                           aria-controls="collapseTwo">
                            个人信息管理
                        </a>
                    </h4>
                </div>
                <div id="collapseTwo" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="headingTwo">
                    <div class="panel-body">
                        <div class="row">
                            <div class="col-xs-2">
                                <h4 class="text-success">更新个人信息</h4>
                            </div>
                        </div>
                        <div class="row" style="margin-bottom: 20px;">
                            <div class="col-xs-12" style="text-align: center;">
                                <div style="position: relative; display: inline-block;">
                                    <img th:src="${currentUser.path} ?: 'https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'"
                                         style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd;"
                                         onerror="this.src='https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'"
                                         id="avatarPreview">
                                    <span th:if="${currentUser.verified == 1}"
                                          style="position: absolute; bottom: 0px; right: 0px; width: 22px; height: 22px; background: #4A90D9; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: bold; line-height: 1;">V</span>
                                </div>
                                <p class="text-muted" style="margin-top: 5px;">当前头像</p>
                            </div>
                        </div>
                        <div style="width:500px;margin: 0 auto;">
                            <form action="/updateProfile.do" method="post" id="profileForm" enctype="multipart/form-data">
                                <table style="text-align: right;font-size: 17px"
                                       class="table table-striped table-bordered table-hover table-condensed">
                                    <tr>
                                        <td>上传新头像</td>
                                        <td>
                                            <input type="file" class="form-control" name="avatarImage" id="avatarImage" accept="image/jpeg,image/png,image/jpg" style="padding: 3px;">
                                            <small class="text-muted">支持JPG、PNG格式，最大5MB</small>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>用户名</td>
                                        <td><input type="text" class="form-control" th:value="${currentUser.uname}" disabled></td>
                                    </tr>
                                    <tr>
                                        <td>用户积分</td>
                                        <td><input type="text" class="form-control" th:value="${currentUser.score}" disabled></td>
                                    </tr>
                                    <tr>
                                        <td>联系电话</td>
                                        <td><input type="text" class="form-control" name="phone" th:value="${currentUser.phone}" placeholder="请输入联系电话"></td>
                                    </tr>
                                    <tr>
                                        <td>职业</td>
                                        <td><input type="text" class="form-control" name="career" th:value="${currentUser.career}" placeholder="请输入职业"></td>
                                    </tr>
                                    <tr>
                                        <td>工作地址</td>
                                        <td><input type="text" class="form-control" name="address" th:value="${currentUser.address}" placeholder="请输入工作地址"></td>
                                    </tr>
                                </table>
                                <div align="center">
                                    <input type="submit" class="btn btn-primary" value="更新信息"/>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 账户注销面板 - 仅普通用户可见 -->
        <div class="row" style="margin-top: 30px;" th:if="${session.user.level == 1}">
            <div class="panel panel-default">
                <div class="panel-heading" role="tab" id="headingThree">
                    <h4 class="panel-title">
                        <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseThree"
                           aria-expanded="true"
                           aria-controls="collapseThree">
                            账户注销
                        </a>
                    </h4>
                </div>
                <div id="collapseThree" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="headingThree">
                    <div class="panel-body">
                        <div class="row">
                            <div class="col-xs-12">
                                <h4 class="text-danger">危险操作</h4>
                                <p class="text-warning">注销账户将永久删除您的所有数据，包括发布的帖子、回复等，此操作不可恢复！</p>
                                <div style="width:500px;margin: 0 auto;">
                                    <form action="/deleteAccount.do" method="post" id="deleteAccountForm"
                                          onsubmit="return confirm('确定要注销账户吗？此操作将删除您的所有数据且不可恢复！');">
                                        <div class="alert alert-danger">
                                            <strong>警告：</strong> 注销后所有数据将被永久删除
                                        </div>
                                        <div align="center">
                                            <button type="submit" class="btn btn-danger">
                                                注销账户
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

<div class="modal fade" id="cropModal" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">裁剪头像</h4>
            </div>
            <div class="modal-body">
                <div class="crop-circle" style="max-width: 100%;">
                    <img id="cropImage" src="" style="max-width: 100%;">
                </div>
                <p class="text-muted" style="margin-top: 10px;">拖动或缩放方框选择要作为头像的区域，头像将以圆形显示</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="confirmCrop">确认裁剪</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
