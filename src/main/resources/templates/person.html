<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人管理</title>
    <script th:src="@{js/jquery/2.0.0/jquery.min.js}" src="js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{../css/bootstrap/3.3.6/bootstrap.min.css}" href="css/bootstrap/3.3.6/bootstrap.min.css"
          rel="stylesheet"/>
    <script th:src="@{js/bootstrap/3.3.6/bootstrap.min.js}" src="js/bootstrap/3.3.6/bootstrap.min.js"></script>
    <script type="text/javascript" th:src="@{js/private.js}"></script>
</head>
<body>

<div class="container">

    <div th:replace="head::header"></div>

    <div class="row">

        <div class="panel panel-default">
            <div class="panel-heading" role="tab" id="headingOne">
                <h4 class="panel-title">
                    <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseOne"
                       aria-expanded="false"
                       aria-controls="collapseOne">
                        密码管理
                    </a>
                </h4>
            </div>
            <div id="collapseOne" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="headingOne">
                <div class="panel-body">
                    <div class="row">
                        <div class="col-xs-2">
                            <h4 class="text-success">更改密码</h4>
                        </div>
                    </div>
                    <div style="width:500px;margin: 0 auto;">
                        <form action="/updatePassword.do" method="post" id="updateForm">
                            <table style="text-align: right;font-size: 17px"
                                   class="table table-striped table-bordered table-hover table-condensed">
                                <tr>
                                    <td>当前密码</td>
                                    <td><input type="password" class="form-control" name="oldPwd" ></td>
                                </tr>
                                <tr>
                                    <td>新密码</td>
                                    <td><input type="password" class="form-control" name="newPwd" id="personNewPwd"></td>
                                </tr>
                                <tr>
                                    <td>确认密码</td>
                                    <td><input type="password" class="form-control" id="personConfirmPwd"></td>
                                </tr>
                            </table>
                            <div align="center">
                                <input type="submit" class="btn btn-danger" value="更改" id="updatePwd"/>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>

        <div class="row" style="margin-top: 30px;">
            <div class="panel panel-default">
                <div class="panel-heading" role="tab" id="headingTwo">
                    <h4 class="panel-title">
                        <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseTwo"
                           aria-expanded="false"
                           aria-controls="collapseTwo">
                            个人信息管理
                        </a>
                    </h4>
                </div>
                <div id="collapseTwo" class="panel-collapse collapse" role="tabpanel" aria-labelledby="headingTwo">
                    <div class="panel-body">
                        <div class="row">
                            <div class="col-xs-2">
                                <h4 class="text-success">更新个人信息</h4>
                            </div>
                        </div>
                        <div style="width:500px;margin: 0 auto;">
                            <form action="/updateProfile.do" method="post" id="profileForm">
                                <table style="text-align: right;font-size: 17px"
                                       class="table table-striped table-bordered table-hover table-condensed">
                                    <tr>
                                        <td>用户名</td>
                                        <td><input type="text" class="form-control" th:value="${session.user.uname}" disabled></td>
                                    </tr>
                                    <tr>
                                        <td>用户积分</td>
                                        <td><input type="text" class="form-control" th:value="${session.user.score}" disabled></td>
                                    </tr>
                                    <tr>
                                        <td>联系电话</td>
                                        <td><input type="text" class="form-control" name="phone" th:value="${session.user.phone}" placeholder="请输入联系电话"></td>
                                    </tr>
                                    <tr>
                                        <td>职业</td>
                                        <td><input type="text" class="form-control" name="career" th:value="${session.user.career}" placeholder="请输入职业"></td>
                                    </tr>
                                    <tr>
                                        <td>工作地址</td>
                                        <td><input type="text" class="form-control" name="address" th:value="${session.user.address}" placeholder="请输入工作地址"></td>
                                    </tr>
                                </table>
                                <div align="center">
                                    <input type="submit" class="btn btn-primary" value="更新信息"/>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 账户注销面板 - 仅普通用户可见 -->
        <div class="row" style="margin-top: 30px;" th:if="${session.user.level == 1}">
            <div class="panel panel-default">
                <div class="panel-heading" role="tab" id="headingThree">
                    <h4 class="panel-title">
                        <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseThree"
                           aria-expanded="false"
                           aria-controls="collapseThree">
                            账户注销
                        </a>
                    </h4>
                </div>
                <div id="collapseThree" class="panel-collapse collapse" role="tabpanel" aria-labelledby="headingThree">
                    <div class="panel-body">
                        <div class="row">
                            <div class="col-xs-12">
                                <h4 class="text-danger">危险操作</h4>
                                <p class="text-warning">注销账户将永久删除您的所有数据，包括发布的帖子、回复等，此操作不可恢复！</p>
                                <div style="width:500px;margin: 0 auto;">
                                    <form action="/deleteAccount.do" method="post" id="deleteAccountForm"
                                          onsubmit="return confirm('确定要注销账户吗？此操作将删除您的所有数据且不可恢复！');">
                                        <div class="alert alert-danger">
                                            <strong>警告：</strong> 注销后所有数据将被永久删除
                                        </div>
                                        <div align="center">
                                            <button type="submit" class="btn btn-danger">
                                                注销账户
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
