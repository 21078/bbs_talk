<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>后台管理</title>

    <script th:src="@{/js/jquery/2.0.0/jquery.min.js}" src="/js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{/css/bootstrap/3.3.6/bootstrap.min.css}" href="/css/bootstrap/3.3.6/bootstrap.min.css"
          rel="stylesheet"/>
    <script th:src="@{/js/bootstrap/3.3.6/bootstrap.min.js}" src="/js/bootstrap/3.3.6/bootstrap.min.js"></script>
    <script type="text/javascript" th:src="@{/js/private.js}"></script>
    <script th:inline="javascript">
        function toggleRegistration()
        {
            $.post("/admin/toggleRegistration", function (data)
            {
                alert(data);
                location.reload();
            });
        }

        function toggleInteraction()
        {
            $.post("/admin/toggleInteraction", function (data)
            {
                alert(data);
                location.reload();
            });
        }

        function sendGlobalNotification()
        {
            var content = $("#globalNotifContent").val();
            if (!content.trim()) {
                alert("请输入通知内容");
                return;
            }
            $.post("/admin/sendGlobalNotification", {content: content}, function (data)
            {
                alert(data);
                if (data.indexOf("已发送") !== -1) {
                    $("#globalNotifContent").val("");
                }
            });
        }
    </script>
</head>
<body>
<div class="container">
    <div th:replace="head::header"></div>

    <div class="row">

        <div class="panel panel-default">
            <div class="panel-heading" role="tab" id="headingTwo">
                <h4 class="panel-title">
                    <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseTwo"
                       aria-expanded="false"
                       aria-controls="collapseTwo">
                        用户管理
                    </a>
                </h4>
            </div>
            <div id="collapseTwo" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="headingTwo">
                <div class="panel-body">
                    <div class="row">
                        <div class="col-xs-2">
                            <h4 class="text-success">用户列表</h4>
                        </div>
                    </div>


                    <table class="table table-striped table-bordered table-hover  table-condensed">
                        <thead>
                        <th>用户id</th>
                        <th>用户名</th>
                        <th>创建时间</th>
                        <th>状态</th>
                        <th>认证</th>
                        <th>操作</th>
                        </thead>
                        <tbody>
                        <tr th:each="user:${userList}">
                            <td th:text="${user.uid}">1</td>
                            <td th:text="${user.uname}">xxx</td>
                            <td th:text="${#dates.format(user.ucreatetime,'yyyy-MM-dd HH:mm:ss')}">2019-02-05-08:00:00
                            </td>
                            <td th:text="${user.ustate== 1}?|正常|:|禁言|">正常</td>
                            <td>
                                <span th:text="${user.verified == 1}?|已认证|:|未认证|">未认证</span>
                                |
                                <a href="#" th:onclick="'toggleVerified('+${user.uid}+')'"
                                   th:text="${user.verified == 1}?'取消认证':'认证'" style="cursor:pointer;">认证</a>
                            </td>
                            <td>
                                <span th:if="${user.level == 1}">
                                    <a href="#" th:text="${user.ustate== 1}?'禁言':'解禁'"
                                       th:onclick="${user.ustate== 1}?'banUser('+${user.uid}+')':'unbanUser('+${user.uid}+')'">禁言</a>
                                    |
                                    <a href="#" th:onclick="'adminDeleteUser('+${user.uid}+')'"
                                       class="text-danger">注销</a>
                                </span>
                                <span th:if="${user.level != 1}">
                                    &nbsp;
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>


        <div class="panel panel-default">
            <div class="panel-heading">
                <h4 class="panel-title" style="font-size:12px;color:#999;">
                    全局设置
                </h4>
            </div>
            <div class="panel-body" style="font-size:12px;">
                <div style="margin-bottom:8px;">
                    <span style="color:#999;">是否允许注册：</span>
                    <span th:text="${allowRegistration} ? '允许注册' : '关闭注册'" style="color:#999;"></span>
                    <button type="button" class="btn btn-link btn-xs" style="color:#999;text-decoration:none;" onclick="toggleRegistration()">切换</button>
                </div>
                <div style="margin-bottom:8px;">
                    <span style="color:#999;">是否允许互动：</span>
                    <span th:text="${allowInteraction} ? '允许互动' : '禁止互动'" style="color:#999;"></span>
                    <button type="button" class="btn btn-link btn-xs" style="color:#999;text-decoration:none;" onclick="toggleInteraction()">切换</button>
                </div>
                <div style="margin-bottom:0px;">
                    <span style="color:#999;">帖子12怒气值满后跳转：</span>
                    <span th:text="${videoRedirectEnabled} ? '跳转视频' : '返回帖子'" style="color:#999;"></span>
                    <button type="button" class="btn btn-link btn-xs" style="color:#999;text-decoration:none;" onclick="toggleVideoRedirect()">切换</button>
                </div>
            </div>
        </div>

        <div class="panel panel-default">
            <div class="panel-heading">
                <h4 class="panel-title" style="font-size:12px;color:#999;">
                    全局通知
                </h4>
            </div>
            <div class="panel-body" style="font-size:12px;">
                <div style="margin-bottom:8px;">
                    <textarea id="globalNotifContent" class="form-control" rows="3" placeholder="输入全局通知内容，将发送给所有用户..."></textarea>
                </div>
                <button type="button" class="btn btn-primary btn-xs" onclick="sendGlobalNotification()">发送全局通知</button>
            </div>
        </div>

    </div>
</div>


</body>

</html>
