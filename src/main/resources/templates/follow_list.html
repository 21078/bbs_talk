<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title th:text="${currentType == 'fans'} ? '我的粉丝' : '我的关注'">我的关注</title>

    <script th:src="@{/js/jquery/2.0.0/jquery.min.js}" src="/js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{/css/bootstrap/3.3.6/bootstrap.min.css}" href="/css/bootstrap/3.3.6/bootstrap.min.css" rel="stylesheet"/>
    <script th:src="@{/js/bootstrap/3.3.6/bootstrap.min.js}" src="/js/bootstrap/3.3.6/bootstrap.min.js"></script>

    <script type="text/javascript" th:src="@{/js/private.js}"></script>
    <link th:href="@{/css/tx.css}" rel="stylesheet"/>

</head>
<body>
<canvas id="canvas"></canvas>
<script type="text/javascript" th:src="@{/js/triangle-bg.js}"></script>

<div class="container">
    <div th:replace="head::header"></div>

    <h2 th:text="${currentType == 'fans'} ? '我的粉丝' : '我的关注'">我的关注</h2>

    <ul class="nav nav-tabs" style="margin-bottom: 20px;">
        <li th:classappend="${currentType == 'following' or currentType == null} ? 'active' : ''">
            <a th:href="@{/follow/list(type='following')}">我的关注</a>
        </li>
        <li th:classappend="${currentType == 'fans'} ? 'active' : ''">
            <a th:href="@{/follow/list(type='fans')}">我的粉丝</a>
        </li>
    </ul>

    <div>
        <div class="row" th:each="followUser:${page.modelList}">
            <div class="col-xs-12">
                <div class="panel panel-info">
                    <div class="panel-body" style="display: flex; align-items: center; padding: 15px 20px;">
                        <div style="position: relative; display: inline-block; margin-right: 15px;">
                            <img th:src="${followUser.path} ?: 'https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'"
                                 style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd;"
                                 onerror="this.src='https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'">
                            <span th:if="${followUser.verified == 1}"
                                  style="position: absolute; bottom: 0px; right: 0px; width: 18px; height: 18px; background: #4A90D9; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: bold; line-height: 1;">V</span>
                        </div>
                        <div style="flex: 1;">
                            <h4 style="margin: 0 0 5px 0;" th:text="${followUser.uname}">用户名</h4>
                            <p style="margin: 0; color: #888; font-size: 13px;" th:text="|${followUser.career ?: '未设置职业'} · ${followUser.address ?: '未设置地址'}|">职业 · 地址</p>
                        </div>
                        <div>
                            <a th:href="|/user/${followUser.uid}/posts|" class="btn btn-primary" style="margin-right: 8px;">
                                <span class="glyphicon glyphicon glyphicon-list-alt"></span> 查看TA的帖子
                            </a>
                            <span th:if="${currentType == 'fans'}">
                                <span th:if="${followStatusMap != null and followStatusMap.containsKey(followUser.uid) and followStatusMap.get(followUser.uid)}">
                                    <button type="button" class="btn btn-default" disabled>
                                        <span class="glyphicon glyphicon-ok"></span> 已关注
                                    </button>
                                </span>
                                <span th:unless="${followStatusMap != null and followStatusMap.containsKey(followUser.uid) and followStatusMap.get(followUser.uid)}">
                                    <button type="button" class="btn btn-success"
                                            th:onclick="'followFan('+${followUser.uid}+')'">
                                        <span class="glyphicon glyphicon-plus"></span> 关注TA
                                    </button>
                                </span>
                            </span>
                            <span th:if="${currentType != 'fans'}">
                                <button type="button" class="btn btn-danger"
                                        th:onclick="'unfollowUser('+${followUser.uid}+')'">
                                    <span class="glyphicon glyphicon-remove"></span> 取消关注
                                </button>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" th:if="${page.modelList == null || #lists.isEmpty(page.modelList)}">
            <div class="col-xs-12">
                <div class="alert alert-info">
                    <p th:text="${currentType == 'fans'} ? '还没有人关注您。' : '您还没有关注任何用户。'">您还没有关注任何用户。</p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-xs-12">
                <nav>
                    <ul class="pager">
                        <li class="previous" th:if="${page.currentPage!=1}">
                            <a th:href="|/follow/list?type=${currentType}&page=${page.currentPage-1}|">
                                <span aria-hidden="true">&larr;</span> 上一页
                            </a>
                        </li>
                        <li class="text-primary" th:text="|当前第${page.currentPage}页，共${page.pageTotal}页|">当前第1页，共4页</li>
                        <li class="next" th:if="${page.currentPage!=page.pageTotal}">
                            <a th:href="|/follow/list?type=${currentType}&page=${page.currentPage+1}|">
                                下一页<span aria-hidden="true">&rarr;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userProfileModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-body" style="text-align: center; padding: 25px;">
                <div id="userProfileAvatarWrapper" style="position: relative; display: inline-block;">
                    <img id="userProfileAvatar" src="" alt="头像"
                         style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #eee;"
                         onerror="this.src='https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'">
                    <span id="userProfileBadge" style="display: none; position: absolute; bottom: 2px; right: 2px; width: 22px; height: 22px; background: #4A90D9; border-radius: 50%; border: 2px solid white; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: bold; line-height: 1;">V</span>
                </div>
                <h4 id="userProfileName" style="margin-bottom: 15px; color: #333;"></h4>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>联系电话：</strong><span id="userProfilePhone"></span>
                </p>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>职业：</strong><span id="userProfileCareer"></span>
                </p>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>工作地址：</strong><span id="userProfileAddress"></span>
                </p>
                <div id="followBtnContainer" style="margin-top: 15px; display: none;">
                    <button type="button" class="btn btn-primary" id="followBtn" style="display: none;" onclick="handleFollow()">关注</button>
                    <button type="button" class="btn btn-danger" id="unfollowBtn" style="display: none;" onclick="handleUnfollow()">取消关注</button>
                </div>
                <button type="button" class="btn btn-default" data-dismiss="modal" style="margin-top: 15px;">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
var currentProfileUid = null;
var currentFollowed = false;

function showUserProfile(uid) {
    currentProfileUid = uid;
    $.get('/user/profile/' + uid, function(data) {
        if (data.error) {
            alert(data.error);
            return;
        }
        $('#userProfileAvatar').attr('src', data.path || 'https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg');
        $('#userProfileName').text(data.uname || '未知用户');
        $('#userProfilePhone').text(data.phone || '未设置');
        $('#userProfileCareer').text(data.career || '未设置');
        $('#userProfileAddress').text(data.address || '未设置');
        if (data.verified == 1) {
            $('#userProfileBadge').css('display', 'flex');
        } else {
            $('#userProfileBadge').css('display', 'none');
        }
        checkFollowStatus(uid);
        $('#userProfileModal').modal('show');
    }).fail(function() {
        alert('获取用户信息失败');
    });
}

function checkFollowStatus(uid) {
    var currentUserUid = '/*[[${session.user != null ? session.user.uid : ""}]]*/';
    if (!currentUserUid || currentUserUid == uid) {
        $('#followBtnContainer').hide();
        return;
    }
    $('#followBtnContainer').show();
    $.get('/follow/check/' + uid, function(data) {
        if (data.loggedIn) {
            currentFollowed = data.isFollowed;
            if (data.isFollowed) {
                $('#followBtn').hide();
                $('#unfollowBtn').show();
            } else {
                $('#followBtn').show();
                $('#unfollowBtn').hide();
            }
        } else {
            $('#followBtnContainer').hide();
        }
    });
}

function handleFollow() {
    $.get('/follow/add/' + currentProfileUid, function(data) {
        alert(data);
        if (data == '关注成功') {
            currentFollowed = true;
            $('#followBtn').hide();
            $('#unfollowBtn').show();
        }
    });
}

function handleUnfollow() {
    $.get('/follow/remove/' + currentProfileUid, function(data) {
        alert(data);
        if (data == '取消关注成功') {
            currentFollowed = false;
            $('#followBtn').show();
            $('#unfollowBtn').hide();
        }
    });
}

function unfollowUser(uid) {
    if (confirm('确定要取消关注该用户吗？')) {
        $.get('/follow/remove/' + uid, function(data) {
            alert(data);
            if (data == '取消关注成功') {
                location.reload();
            }
        });
    }
}

function followFan(uid) {
    $.get('/follow/add/' + uid, function(data) {
        alert(data);
        if (data == '关注成功') {
            location.reload();
        }
    });
}
</script>
</body>
</html>
