<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>我的收藏</title>

    <script th:src="@{../js/jquery/2.0.0/jquery.min.js}" src="js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{../css/bootstrap/3.3.6/bootstrap.min.css}" href="css/bootstrap/3.3.6/bootstrap.min.css" rel="stylesheet"/>
    <script th:src="@{../js/bootstrap/3.3.6/bootstrap.min.js}" src="js/bootstrap/3.3.6/bootstrap.min.js"></script>

    <script type="text/javascript" th:src="@{../js/private.js}"></script>
    <link th:href="@{../css/tx.css}" rel="stylesheet"/>

</head>
<body>
<canvas id="canvas"></canvas>
<script type="text/javascript" th:src="@{../js/canvas.js}"></script>


<div class="container">
    <div th:replace="head::header"></div>

    <h2>我的收藏</h2>

    <div class="row" th:each="favorite:${favoriteList}">
        <div class="col-xs-12">
            <div class="panel panel-info favorite-list-item">
                <div class="panel-heading" th:text="${favorite.post.ptitle}" style="font-size: 18px;font-weight: bolder">帖子标题</div>
                <div class="panel-body" th:utext="${favorite.post.pbody}" style="height: 95px;display: -webkit-box;-webkit-box-orient: vertical;-webkit-line-clamp: 4;overflow: hidden;">
                    帖子内容
                </div>
                <div class="panel-footer" style="height: 40px;">
                    <div class="col-xs-2">
                        <span class="text-info" th:text="|发帖用户:${favorite.post.user.uname}|">发帖用户:xxx</span>
                    </div>
                    <div class="col-xs-3">
                        <span class="text-primary"
                              th:text="${favorite.post.lastreplytime==null}?|发帖时间:${#dates.format(favorite.post.psendtime,'yyyy-MM-dd HH:mm:ss')}|:|最后回复时间:${#dates.format(favorite.post.lastreplytime,'yyyy-MM-dd HH:mm:ss')}|">最后回复时间:2019-2-5-08:00:00</span>
                    </div>
                    <div class="col-xs-3">
                        <span class="favorite-time" th:text="|收藏时间:${#dates.format(favorite.favtime,'yyyy-MM-dd HH:mm:ss')}|">收藏时间</span>
                    </div>
                    <div class="col-xs-1">
                        <span class="badge" th:text="|回复数:${favorite.post.replyCount}|">回复数:42</span>
                    </div>
                    <div class="col-xs-1">
                        <a th:href="|/post/${favorite.post.pid}.html|">
                            <button type="button" class="btn btn-primary btn-xs">查看</button>
                        </a>
                    </div>
                    <div class="col-xs-1">
                        <button type="button" class="btn btn-danger btn-xs favorite-btn"
                                th:onclick="'removeFavorite('+${favorite.post.pid}+')'">
                            <span class="glyphicon glyphicon-star"></span> 取消收藏
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row" th:if="${#lists.isEmpty(favoriteList)}">
        <div class="col-xs-12">
            <div class="alert alert-info">
                <p>您还没有收藏任何帖子。</p>
            </div>
        </div>
    </div>

</div>
</body>
</html>
