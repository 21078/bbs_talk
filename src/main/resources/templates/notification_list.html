<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>通知中心</title>
    <script th:src="@{/js/jquery/2.0.0/jquery.min.js}" src="/js/jquery/2.0.0/jquery.min.js"></script>
    <link th:href="@{/css/bootstrap/3.3.6/bootstrap.min.css}" href="/css/bootstrap/3.3.6/bootstrap.min.css" rel="stylesheet"/>
    <script th:src="@{/js/bootstrap/3.3.6/bootstrap.min.js}" src="/js/bootstrap/3.3.6/bootstrap.min.js"></script>
    <script type="text/javascript" th:src="@{/js/private.js}"></script>
    <link th:href="@{/css/tx.css}" rel="stylesheet"/>
</head>
<body>
<canvas id="canvas"></canvas>
<script type="text/javascript" th:src="@{/js/triangle-bg.js}"></script>

<div class="container">
    <div th:replace="head::header"></div>

    <h2>通知中心</h2>

    <ul class="nav nav-tabs" style="margin-bottom: 20px;">
        <li th:classappend="${currentType == null or currentType == 'all'} ? 'active' : ''">
            <a th:href="@{/notification/page(type='all')}">
                全部
                <span id="tab-badge-all" class="badge" th:text="${unreadTotal}" th:style="${unreadTotal > 0} ? '' : 'display:none;'">0</span>
            </a>
        </li>
        <li th:classappend="${currentType == 'reply'} ? 'active' : ''">
            <a th:href="@{/notification/page(type='reply')}">
                回复
                <span id="tab-badge-reply" class="badge" th:text="${unreadByType['reply']}" th:style="${unreadByType['reply'] > 0} ? '' : 'display:none;'">0</span>
            </a>
        </li>
        <li th:classappend="${currentType == 'favorite'} ? 'active' : ''">
            <a th:href="@{/notification/page(type='favorite')}">
                收藏
                <span id="tab-badge-favorite" class="badge" th:text="${unreadByType['favorite']}" th:style="${unreadByType['favorite'] > 0} ? '' : 'display:none;'">0</span>
            </a>
        </li>
        <li th:classappend="${currentType == 'follow'} ? 'active' : ''">
            <a th:href="@{/notification/page(type='follow')}">
                关注
                <span id="tab-badge-follow" class="badge" th:text="${unreadByType['follow']}" th:style="${unreadByType['follow'] > 0} ? '' : 'display:none;'">0</span>
            </a>
        </li>
        <li th:classappend="${currentType == 'system'} ? 'active' : ''">
            <a th:href="@{/notification/page(type='system')}">
                系统
                <span id="tab-badge-system" class="badge" th:text="${unreadByType['system']}" th:style="${unreadByType['system'] > 0} ? '' : 'display:none;'">0</span>
            </a>
        </li>
        <li style="float:right;">
            <button class="btn btn-success btn-xs" id="markAllReadBtn" style="margin-top:8px;">全部已读</button>
        </li>
    </ul>

    <div>
        <div class="row" th:each="item : ${page.modelList}">
            <div class="col-xs-12">
                <div class="panel panel-info" th:classappend="${item.isRead == 0} ? 'panel-warning' : 'panel-info'">
                    <div class="panel-body" style="display: flex; align-items: center; padding: 15px 20px;">
                        <div style="flex: 1;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
                                <span th:if="${item.type == 'system'}" class="label label-default">系统</span>
                                <span th:if="${item.type == 'reply'}" class="label label-primary">回复</span>
                                <span th:if="${item.type == 'favorite'}" class="label label-danger">收藏</span>
                                <span th:if="${item.type == 'follow'}" class="label label-success">关注</span>
                                <span th:if="${item.isRead == 0}" class="label label-warning">未读</span>
                                <span style="color: #999; font-size: 12px;" th:text="${#dates.format(item.createTime, 'yyyy-MM-dd HH:mm')}"></span>
                            </div>
                            <div style="font-size: 14px; cursor:pointer;"
                                 th:attr="data-type=${item.type}, data-pid=${item.pid}, data-fromUid=${item.fromUid}">
                                <span th:text="${item.content}" th:style="${item.isRead == 0} ? 'font-weight:bold;' : ''"></span>
                            </div>
                        </div>
                        <div style="display: flex; gap: 8px; align-items: center; flex-shrink: 0; margin-left: 10px;">
                            <button th:if="${item.isRead == 0}" class="btn btn-xs btn-link mark-read-btn"
                                    th:attr="data-nid=${item.nid}" style="text-decoration:none; padding:0; font-size:12px;">标为已读</button>
                            <button th:if="${item.type != 'system'}" class="btn btn-xs btn-link delete-notification-btn"
                                    th:attr="data-nid=${item.nid}" style="text-decoration:none; padding:0; font-size:12px; color:#e74c3c;">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" th:if="${page.modelList == null || #lists.isEmpty(page.modelList)}">
            <div class="col-xs-12">
                <div class="alert alert-info">
                    <p>暂无通知</p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-xs-12">
                <nav>
                    <ul class="pager">
                        <li class="previous" th:if="${page.currentPage != 1}">
                            <a th:href="@{/notification/page(type=${currentType != null ? currentType : 'all'}, page=${page.currentPage - 1})}">
                                <span aria-hidden="true">&larr;</span> 上一页
                            </a>
                        </li>
                        <li class="text-primary" th:text="|当前第${page.currentPage}页，共${page.pageTotal}页|">当前第1页，共4页</li>
                        <li class="next" th:if="${page.currentPage != page.pageTotal}">
                            <a th:href="@{/notification/page(type=${currentType != null ? currentType : 'all'}, page=${page.currentPage + 1})}">
                                下一页<span aria-hidden="true">&rarr;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userProfileModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-body" style="text-align: center; padding: 25px;">
                <div id="userProfileAvatarWrapper" style="position: relative; display: inline-block;">
                    <img id="userProfileAvatar" src="" alt="头像"
                         style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #eee;"
                         onerror="this.src='https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'">
                    <span id="userProfileBadge" style="display: none; position: absolute; bottom: 2px; right: 2px; width: 22px; height: 22px; background: #4A90D9; border-radius: 50%; border: 2px solid white; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: bold; line-height: 1;">V</span>
                </div>
                <h4 id="userProfileName" style="margin-bottom: 15px; color: #333;"></h4>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>联系电话：</strong><span id="userProfilePhone"></span>
                </p>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>职业：</strong><span id="userProfileCareer"></span>
                </p>
                <p style="margin: 5px 0; font-size: 14px; color: #666;">
                    <strong>工作地址：</strong><span id="userProfileAddress"></span>
                </p>
                <div id="followBtnContainer" style="margin-top: 15px; display: none;">
                    <button type="button" class="btn btn-primary" id="followBtn" style="display: none;" onclick="handleFollow()">关注</button>
                    <button type="button" class="btn btn-danger" id="unfollowBtn" style="display: none;" onclick="handleUnfollow()">取消关注</button>
                </div>
                <button type="button" class="btn btn-default" data-dismiss="modal" style="margin-top: 15px;">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
var currentProfileUid = null;
var currentFollowed = false;

function showUserProfile(uid) {
    currentProfileUid = uid;
    $.get('/user/profile/' + uid, function(data) {
        if (data.error) { alert(data.error); return; }
        $('#userProfileAvatar').attr('src', data.path || 'https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg');
        $('#userProfileName').text(data.uname || '未知用户');
        $('#userProfilePhone').text(data.phone || '未设置');
        $('#userProfileCareer').text(data.career || '未设置');
        $('#userProfileAddress').text(data.address || '未设置');
        if (data.verified == 1) {
            $('#userProfileBadge').css('display', 'flex');
        } else {
            $('#userProfileBadge').css('display', 'none');
        }
        checkFollowStatus(uid);
        $('#userProfileModal').modal('show');
    }).fail(function() { alert('获取用户信息失败'); });
}

function checkFollowStatus(uid) {
    var currentUserUid = '/*[[${session.user != null ? session.user.uid : ""}]]*/';
    if (!currentUserUid || currentUserUid == uid) {
        $('#followBtnContainer').hide();
        return;
    }
    $('#followBtnContainer').show();
    $.get('/follow/check/' + uid, function(data) {
        if (data.loggedIn) {
            currentFollowed = data.isFollowed;
            if (data.isFollowed) { $('#followBtn').hide(); $('#unfollowBtn').show(); }
            else { $('#followBtn').show(); $('#unfollowBtn').hide(); }
        } else { $('#followBtnContainer').hide(); }
    });
}

function handleFollow() {
    $.get('/follow/add/' + currentProfileUid, function(data) {
        alert(data);
        if (data == '关注成功') { currentFollowed = true; $('#followBtn').hide(); $('#unfollowBtn').show(); }
    });
}

function handleUnfollow() {
    $.get('/follow/remove/' + currentProfileUid, function(data) {
        alert(data);
        if (data == '取消关注成功') { currentFollowed = false; $('#followBtn').show(); $('#unfollowBtn').hide(); }
    });
}

$(function() {
    // 点击通知内容：回复/收藏跳帖子，关注弹用户信息
    $('[data-type]').click(function() {
        var type = $(this).data('type');
        var pid = $(this).data('pid');
        var fromUid = $(this).data('fromuid');
        if (type === 'reply' || type === 'favorite') {
            location.href = '/post/' + pid + '.html';
        } else if (type === 'follow' || type === 'system') {
            showUserProfile(fromUid);
        }
    });

    $('.mark-read-btn').click(function() {
        var nid = $(this).data('nid');
        var btn = $(this);
        var type = btn.closest('.panel-body').find('[data-type]').data('type');
        $.post('/notification/read/' + nid, function() {
            btn.closest('.panel').removeClass('panel-warning').addClass('panel-info');
            btn.closest('.panel-body').find('[data-type] span').css('font-weight', 'normal');
            btn.closest('.panel-body').find('.label-warning').remove();
            btn.remove();
            decrementTabBadge('all');
            if (type) decrementTabBadge(type);
        });
    });

    $('.delete-notification-btn').click(function() {
        var nid = $(this).data('nid');
        if (confirm('确定要删除这条通知吗？')) {
            var btn = $(this);
            var isUnread = btn.closest('.panel-body').find('.label-warning').length > 0;
            var type = btn.closest('.panel-body').find('[data-type]').data('type');
            $.post('/notification/delete/' + nid, function() {
                btn.closest('.row').remove();
                if ($('.panel-info, .panel-warning').length === 0) {
                    $('.panel-info').closest('div').html(
                        '<div class="col-xs-12"><div class="alert alert-info"><p>暂无通知</p></div></div>'
                    );
                }
                if (isUnread) {
                    decrementTabBadge('all');
                    if (type) decrementTabBadge(type);
                }
            });
        }
    });

    $('#markAllReadBtn').click(function() {
        $.post('/notification/read-all', function() { location.reload(); });
    });
});
</script>
</body>
</html>
