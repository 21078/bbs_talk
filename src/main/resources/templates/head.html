<header th:fragment="header" xmlns:th="http://www.thymeleaf.org">


    <div class="modal fade" id="sendModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button data-dismiss="modal" class="close" type="button"><span aria-hidden="true">×</span><span
                            class="sr-only">Close</span></button>
                    <h4 class="modal-title">发帖</h4>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" placeholder="帖子标题" name="" id="sendPostTitle" value=""/>
                    <p></p>
                    <select class="form-control" id="sendPostCategory">
                        <option value="">请选择板块</option>
                        <option value="娱乐">娱乐</option>
                        <option value="技术">技术</option>
                        <option value="美食">美食</option>
                        <option value="旅游">旅游</option>
                        <option value="问题">问题</option>
                    </select>
                    <p></p>
                    <input type="number" class="form-control" placeholder="奖励积分(1-10，仅问题板块需要)"
                           id="sendPostPrize" min="1" max="10" style="display:none;"/>
                    <p></p>
                    <textarea style="height: 100px;" class="form-control" placeholder="帖子内容"
                              id="sendPostBody"></textarea>
                    <p></p>
                    <div class="form-group">
                        <label for="coverImage">封面图片（可选）：</label>
                        <input type="file" class="form-control-file" id="coverImage" accept="image/jpeg,image/jpg,image/png">
                        <small class="form-text text-muted">只支持JPG、PNG格式，建议尺寸800x600，最大5MB</small>

                        <!-- 图片预览区域 -->
                        <div id="imagePreview" style="margin-top: 10px; display: none;">
                            <img id="previewImage" src="" alt="预览" style="max-width: 100%; max-height: 200px; border-radius: 4px; border: 1px solid #ddd; padding: 5px;">
                            <button type="button" class="btn btn-xs btn-danger" id="removeImage" style="margin-top: 5px;">
                                <span class="glyphicon glyphicon-trash"></span> 移除图片
                            </button>
                        </div>

                        <!-- 文件大小提示 -->
                        <div id="fileSizeWarning" style="margin-top: 5px; display: none;">
                            <small class="text-danger" id="fileSizeText"></small>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button data-dismiss="modal" class="btn btn-default" type="button">关闭</button>
                    <button class="btn btn-primary" type="button" id="sendPostButton">发送</button>
                </div>
            </div><!-- /.modal-content -->
        </div><!-- /.modal-dialog -->
    </div>


    <div class="modal fade" id="loginModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
        <div class="modal-dialog">

            <div class="modal-content">
                <div class="modal-header">
                    <button data-dismiss="modal" class="close" type="button"><span aria-hidden="true">×</span><span
                            class="sr-only">Close</span></button>
                    <h4 class="modal-title">登录</h4>
                </div>

                <div class="modal-body">
                    <div class="input-group input-group">
                        <span class="input-group-addon" id="basic-addon1">用户</span>
                        <input type="text" class="form-control" id="loginUname" name="uname" placeholder="用户名"
                               aria-describedby="basic-addon1"/>
                    </div>
                    <div class="input-group input-group">
                        <span class="input-group-addon" id="basic-addon1">密码</span>
                        <input type="password" class="form-control" id="loginUpwd" name="upwd" placeholder="密码"
                               aria-describedby="basic-addon1"/>
                    </div>

                </div>
                <div class="modal-footer">
                    <button data-dismiss="modal" class="btn btn-default" type="button">关闭</button>
                    <button class="btn btn-primary" type="button" id="loginButton">登录</button>
                </div>
            </div><!-- /.modal-content -->

        </div><!-- /.modal-dialog -->
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
        <div class="modal-dialog">

            <div class="modal-content">
                <div class="modal-header">
                    <button data-dismiss="modal" class="close" type="button"><span aria-hidden="true">×</span><span
                            class="sr-only">Close</span></button>
                    <h4 class="modal-title">注册</h4>
                </div>
                <div class="modal-body">

                    <div class="input-group input-group">
                        <span class="input-group-addon" id="basic-addon1">用户昵称</span>
                        <input type="text" class="form-control" id="registerUname" placeholder="用户名"
                               aria-describedby="basic-addon1"/>
                        <span class="input-group-addon"></span>
                    </div>
                    <div class="input-group input-group">
                        <span class="input-group-addon" id="basic-addon1">用户密码</span>
                        <input type="password" class="form-control" id="registerUpwd" placeholder="密码(至少6位)"
                               aria-describedby="basic-addon1"/>
                        <span class="input-group-addon"></span>
                    </div>
                    <div class="input-group input-group">
                        <span class="input-group-addon" id="basic-addon1">确认密码</span>
                        <input type="password" class="form-control" id="registerconfirmUpwd" placeholder="确认密码(至少6位)"
                               aria-describedby="basic-addon1"/>
                        <span class="input-group-addon"></span>
                    </div>


                </div>
                <div class="modal-footer">
                    <button data-dismiss="modal" class="btn btn-default" type="button">关闭</button>
                    <button class="btn btn-primary" id="registerButton" type="button">注册</button>
                </div>

            </div><!-- /.modal-content -->

        </div><!-- /.modal-dialog -->
    </div>
    <div class="row">

        <div class="col-xs-2">
            <h5 class="text-success"><a href="/">匿名论坛</a></h5>
        </div>

        <div th:if="${session.user == null}">
            <div class="col-xs-7"></div>
            <div class="col-xs-1">
                <button type="button" class="btn btn-link" data-toggle="modal" data-target="#loginModal">登录</button>
            </div>
            <div class="col-xs-1">
                <button type="button" class="btn btn-link"
                        th:attr="data-toggle=${allowRegistration == null or allowRegistration} ? 'modal' : null,
                                 data-target=${allowRegistration == null or allowRegistration} ? '#registerModal' : null"
                        th:onclick="${allowRegistration == null or allowRegistration} ? null : 'alert(\'管理员已关闭注册功能\')'">注册</button>
            </div>
        </div>
        <div th:if="${session.user != null}" style="position:relative;">
            <div class="col-xs-1">
                <a href="/host.do" th:if="${session.user.level == 0}">
                    <button class="btn btn-link">后台</button>
                </a>
            </div>
            <div class="col-xs-1">
                <a href="/quick_start" th:if="${session.user.verified == 1}">
                    <button class="btn btn-link">快速入口</button>
                </a>
            </div>
            <div class="col-xs-1">
                <button class="btn btn-link" data-toggle="modal" data-target="#sendModal">发帖</button>
            </div>
            <div class="col-xs-1" id="notificationBellArea" style="position:relative;" th:attr="data-uid=${session.user.uid}">
                <a href="/notification/page" class="btn btn-link" id="notificationBell" style="position:relative; padding:6px 10px;">
                    <span class="glyphicon glyphicon-bell" style="font-size:16px;"></span>
                    <span id="notificationBadge" class="badge" style="display:none; position:absolute; top:0; right:0; padding:2px 5px; font-size:10px; background:#e74c3c; min-width:16px; border-radius:8px; line-height:1.4;">0</span>
                    收件箱
                </a>
            </div>
            <div class="col-xs-1">
                <a href="/myPosts.do">
                    <button class="btn btn-link">我的帖子</button>
                </a>
            </div>
            <div class="col-xs-1">
                <a href="/favorite/list">
                    <button class="btn btn-link">我的收藏</button>
                </a>
            </div>
            <div class="col-xs-1">
                <a href="/follow/list">
                    <button class="btn btn-link">关注/粉丝</button>
                </a>
            </div>
            <div class="col-xs-2">
                <button class="btn btn-link" id="person" style="display: flex; align-items: center;">
                    <div style="position: relative; display: inline-block; margin-right: 5px;">
                        <img th:src="${session.user.path} ?: 'https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'"
                             style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;"
                             onerror="this.src='https://bbspicturebed.oss-cn-huhehaote.aliyuncs.com/post_covers/default_face.jpg'">
                        <span th:if="${session.user.verified == 1}"
                              style="position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; background: #4A90D9; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 9px; color: white; font-weight: bold; line-height: 1;">V</span>
                    </div>
                    <span th:text="|[${session.user.uname}]个人管理|"></span>
                </button>
            </div>
            <div class="col-xs-1">
                <button class="btn btn-link" id="logouot">退出</button>
            </div>
        </div>

    </div>
</header>
